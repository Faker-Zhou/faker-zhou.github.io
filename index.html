<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智休闹钟 | 支持与隐私</title>
  <meta name="description" content="智休闹钟 App 的技术支持与隐私政策公开页面">
  <style>
    :root {
      --bg: #f7f4ee;
      --paper: rgba(255, 255, 255, 0.82);
      --paper-border: rgba(110, 87, 58, 0.14);
      --text: #2f261f;
      --muted: #6d6155;
      --headline: #201914;
      --accent: #b85c38;
      --accent-soft: rgba(184, 92, 56, 0.1);
      --shadow: 0 26px 70px rgba(70, 49, 28, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(218, 186, 140, 0.28), transparent 30%),
        linear-gradient(180deg, #fbf9f5 0%, var(--bg) 100%);
      line-height: 1.8;
    }

    .shell {
      width: min(920px, calc(100% - 32px));
      margin: 40px auto;
    }

    .hero {
      padding: 34px 30px 28px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255, 249, 241, 0.88), rgba(255, 255, 255, 0.7));
      border: 1px solid rgba(184, 92, 56, 0.14);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -40px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(184, 92, 56, 0.2), transparent 68%);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 700;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      line-height: 1.08;
      color: var(--headline);
    }

    .lead {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 1.03rem;
    }

    .meta {
      margin-top: 18px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .content {
      margin-top: 22px;
      padding: 10px 0 18px;
    }

    .section {
      margin-top: 18px;
      background: var(--paper);
      border: 1px solid var(--paper-border);
      border-radius: 24px;
      padding: 24px 22px;
      box-shadow: 0 18px 40px rgba(78, 60, 39, 0.06);
      backdrop-filter: blur(12px);
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 1.2rem;
      color: var(--headline);
    }

    .section p {
      margin: 10px 0 0;
      color: var(--text);
    }

    .actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .button.primary {
      background: var(--accent);
      color: #fffaf5;
      box-shadow: 0 14px 28px rgba(184, 92, 56, 0.22);
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.72);
      color: var(--accent);
      border: 1px solid rgba(184, 92, 56, 0.14);
    }

    .button:hover {
      transform: translateY(-1px);
    }

    a {
      color: var(--accent);
    }

    .footer {
      margin: 26px 0 10px;
      padding: 0 4px 30px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 920px);
        margin: 18px auto 28px;
      }

      .hero,
      .section {
        padding: 22px 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="badge">智休闹钟</div>
      <h1>支持与隐私说明</h1>
      <p class="lead">这是为 App Store Connect 准备的公开页面。您可以通过下方链接查看本应用的隐私政策与技术支持页面。</p>
      <p class="meta">更新时间：2026 年 3 月</p>
    </header>

    <main class="content">
      <section class="section">
        <h2>一、页面入口</h2>
        <div class="actions">
          <a class="button primary" href="./privacy-policy.html">查看隐私政策</a>
          <a class="button secondary" href="./support.html">查看技术支持</a>
          <a class="button secondary" href="mailto:cheszhou@qq.com">联系开发者</a>
        </div>
      </section>

      <section class="section">
        <h2>二、链接说明</h2>
        <p>Privacy Policy URL：<strong>/privacy-policy.html</strong></p>
        <p>Support URL：<strong>/support.html</strong></p>
      </section>

      <section class="section">
        <h2>三、开发者信息</h2>
        <p>开发者：Zhou Quan</p>
        <p>联系邮箱：<a href="mailto:cheszhou@qq.com">cheszhou@qq.com</a></p>
      </section>
    </main>

    <footer class="footer">
      感谢您使用智休闹钟。
    </footer>
  </div>
</body>
</html>
